<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Watchlist — Saptak</title>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }


body{
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  color: #111;
  display: flex;
  min-height: 100vh;
}

a{ text-decoration: none; color: #111; }

/* ── MAIN ── */
.main{
  margin-left: 190px;
  margin-right: 190px;
  flex: 1;
  padding: 60px 64px 120px;
  max-width: 860px;
  transition: margin-left .25s ease, margin-right .25s ease;
}

body.toc-collapsed .main { margin-left: 44px; }
body.tag-collapsed .main  { margin-right: 44px; }

page-tag, .page-title, .meta {
  margin-left: 0; 
}
.page-tag{
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  background: #111;
  color: #f7f7f7;
  display: inline-block;
  padding: 4px 12px;
  border-radius: 999px;
  margin-bottom: 20px;
}

.page-title{
  font-size: 36px;
  font-weight: 700;
  letter-spacing: -1px;
  margin-bottom: 12px;
}

.meta{
  font-size: 13px;
  opacity: .4;
  margin-bottom: 48px;
}

/* ── TIMELINE ── */
:root {
  --line-x:      80px;  /* line offset — creates left gutter for dates */
  --dot-size-h3: 8px;                 /* base unit */

    --dot-size-h2: calc(var(--dot-size-h3) * 1.5);   /* 8 → 12 */
    --gap:         calc(var(--dot-size-h3) * 3);     /* 8 → 24 */
    --date-width:  calc(var(--gap) * 2.33);          /* 24 → ~56 */
}

.timeline-body {
  position: relative;
  padding-left: calc(var(--line-x) + var(--gap));
  margin-left: calc(-0.8 * var(--line-x));  /* ← exact inverse of the gutter */
}

/* THE LINE — centered on left: var(--line-x) via transform */
.timeline-body::after {
  content: '';
  position: absolute;
  left: var(--line-x);
  top: 0;
  bottom: 0;
  width: 2px;
  transform: translateX(-50%);
  /* transparent for first ~15px (h2 margin-top 8px + half h2 height) → line starts at h2 dot */
  background: linear-gradient(to bottom, transparent 0px, transparent 15px, #999 15px, #ccc 50%, #e8e8e8 100%);
  z-index: 0;
}

/* ── H2 — MONTH MARKER ── */
.timeline-body h2 {
  position: relative;
  font-size: 19px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  margin: 56px 0 16px;
  scroll-margin-top: 32px;
}

/* small filled dot on the line for h2 — same size as h3 but darker */
.timeline-body h2::before {
  content: '';
  position: absolute;
  left: calc(-1 * var(--gap));
  top: 50%;
  transform: translate(-50%, -50%);
  width: var(--dot-size-h2);
  height: var(--dot-size-h2);
  border-radius: 50%;
  background: #aaa;
  z-index: 1;
}

.timeline-body h2:first-child { margin-top: 8px; }
.timeline-body h2[hidden] { display: none; }

/* ── H3 — ENTRY ── */
.timeline-body h3 {
  color: #414141;
  position: relative;
  font-size: 17px;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 6px;
  scroll-margin-top: 32px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* hollow ring dot on the line */
.timeline-body h3::before {
  content: '';
  position: absolute;
  left: calc(-1 * var(--gap));
  top: 50%;
  transform: translate(-50%, -50%);
  width: var(--dot-size-h3);
  height: var(--dot-size-h3);
  border-radius: 50%;
  background: #555;
  border: none;
  z-index: 1;
}

/* first entry = most recent → orange accent */
.timeline-body h3:first-of-type::before {
  background: #c8440a;
}

/* hover → dot goes orange */
.timeline-body h3:hover::before {
  background: #c8440a;
}

/* ── DATE — inline flex child before title, no absolute positioning ── */
/* ── DATE — absolute-positioned into the left gutter, right-aligned 8px left of line ── */
.timeline-body h3 .date {
  position: absolute;
  top: 52%;
  transform: translateY(-50%);
  left: calc(-1.1 * var(--gap) - 8px - var(--date-width)); /* dot is at -gap; date sits 8px further left */
  width: var(--date-width);
  text-align: right;
  font-size: 12px;
  font-weight: 500;
  color: #111;
  opacity: 0.4;
  white-space: nowrap;
}

.timeline-body p {
  font-size: 16px;
  line-height: 1.8;
  margin-bottom: 24px;
  opacity: .85;
}

.timeline-body a {
  color: #c8440a;
  text-decoration: underline;
  text-underline-offset: 3px;
  font-weight: 600;
  transition: .2s;
}

.timeline-body a:hover { opacity: .6; }

.timeline-body hr {
  border: none;
  border-top: 1px solid #ddd;
  margin: 40px 0;
}

.timeline-body ul { padding-left: 20px; margin-bottom: 20px; }

.timeline-body li {
  font-size: 16px;
  line-height: 1.8;
  margin-bottom: 6px;
}

.timeline-body blockquote {
  margin: 20px 0;
  padding: 16px 22px;
  border-left: 4px solid #111;
  background: rgba(0,0,0,.04);
  border-radius: 0 10px 10px 0;
  font-style: italic;
  font-size: 16px;
}

.timeline-body h3[hidden] { display: none; }
.timeline-body p[hidden]  { display: none; }
.timeline-body hr[hidden] { display: none; }
.timeline-body h2[hidden] { display: none; }

/* ── FOOTER ── */
.page-footer {
  font-size: 13px;
  opacity: .35;
  margin-top: 80px;
  border-top: 1px solid #ccc;
  padding-top: 28px;
}

/* ── MOBILE ── */
@media (max-width: 768px) {
  .main {
    margin-left: 0;
    margin-right: 0;
    padding: 40px 24px 80px;
  }

  :root {
    --line-x:     56px;  /* tighter gutter on mobile */
    --gap:        18px;
    --date-width: 48px;
  }

  .timeline-body h3 .date {
    font-size: 11px;
  }
}

</style>
</head>
<body>

{% include toc.html %}

<main class="main">

  <div class="page-tag">📡 Watchlist</div>
  <h1 class="page-title">Watchlist</h1>
  <div class="meta">Things I'm tracking</div>

  <div class="timeline-body" id="timeline-body">
    {{ content }}
  </div>

  <div class="page-footer">
    Tracked by Saptak ·
    <a href="{{ site.baseurl }}/">nilarkian.github.io/Saptak</a>
  </div>

</main>

{% include tags.html %}

<script>
document.querySelectorAll('a[href]').forEach(link => {
  if (
    link.hostname &&
    link.hostname !== window.location.hostname
  ) {
    link.target = '_blank';
    link.rel = 'noopener';
  }
});
</script>


</body>
</html>
