<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<title>Design — Swipe File — Saptak</title>
<style>

:root {
  --bg: #f7f7f7;
  --ink: #111;
  --border: #ddd;
  --radius: 18px;
  --pill: 999px;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--bg); color: var(--ink); display: flex; min-height: 100vh; }
a { text-decoration: none; color: var(--ink); }

/* ── SIDEBAR ── */
.sidebar { position: fixed; top: 0; left: 0; width: 240px; height: 100vh; background: #efefef; border-right: 1px solid var(--border); padding: 40px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 28px; }
.sidebar .back { font-family: var(--font-head); font-size: 13px; font-weight: 600; border: 2px solid var(--ink); padding: 8px 16px; border-radius: var(--pill); display: inline-block; transition: .2s; width: fit-content; }
.sidebar .back:hover { background: var(--ink); color: var(--bg); }
.toc-label { font-family: var(--font-head); font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; opacity: .4; }
.toc { display: flex; flex-direction: column; gap: 4px; list-style: none; }
.toc li a { font-family: var(--font-body); font-size: 13px; line-height: 1.5; display: block; padding: 5px 10px; border-radius: 6px; color: #444; transition: .15s; border-left: 2px solid transparent; }
.toc li a:hover { background: rgba(0,0,0,.06); color: var(--ink); }
.toc li a.active { border-left: 2px solid var(--ink); color: var(--ink); font-weight: 600; background: rgba(0,0,0,.05); }

/* ── MAIN ── */
.main { margin-left: 240px; flex: 1; padding: 60px 64px 120px; max-width: 860px; }
.breadcrumb { font-family: var(--font-body); font-size: 12px; opacity: .4; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 24px; }
.breadcrumb span { margin: 0 6px; }
.page-tag { font-family: var(--font-head); font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; background: var(--ink); color: var(--bg); display: inline-block; padding: 4px 12px; border-radius: var(--pill); margin-bottom: 20px; }
.page-title { font-family: var(--font-head); font-size: 42px; font-weight: 700; letter-spacing: -1.5px; margin-bottom: 10px; line-height: 1.1; }
.page-subtitle { font-size: 17px; opacity: .5; margin-bottom: 60px; }
.section-head { font-family: var(--font-head); font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; opacity: .35; margin-bottom: 20px; scroll-margin-top: 32px; }

/* ── MASONRY GRID ── */
.design-grid {
  columns: 2;
  column-gap: 20px;
  margin-bottom: 60px;
}

.design-card {
  break-inside: avoid;
  display: block;
  border: 2px solid var(--ink);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 20px;
  text-decoration: none;
  color: var(--ink);
  transition: .22s ease;
}

.design-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 28px rgba(0,0,0,.11);
}

/* image area — shows actual screenshot */
.design-img {
  width: 100%;
  display: block;
  border-bottom: 2px solid var(--ink);
  background: #e8e8e8;
}

.design-img img {
  width: 100%;
  height: auto;
  display: block;
}

/* placeholder when no image */
.design-img.no-img {
  aspect-ratio: 4 / 3;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  background: #e8fde8;
}

.design-body {
  padding: 16px 18px;
}

.design-source {
  font-family: var(--font-head);
  font-size: 10px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  opacity: .35; margin-bottom: 5px;
}

.design-caption {
  font-family: var(--font-head);
  font-size: 14px; font-weight: 600;
  line-height: 1.4; margin-bottom: 5px;
}

.design-note {
  font-size: 13px; opacity: .45; line-height: 1.5;
}

/* ── FOOTER ── */
.page-footer { font-family: var(--font-body); font-size: 13px; opacity: .35; margin-top: 80px; border-top: 1px solid var(--border); padding-top: 28px; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 40px 24px 80px; }
  .page-title { font-size: 30px; }
  .design-grid { columns: 1; }
}

</style>
</head>
<body>

<aside class="sidebar">
  <a class="back" href="../swipefile.html">← Swipe File</a>
  <div><div class="toc-label">On this page</div></div>
  <ul class="toc" id="toc"></ul>
</aside>

<main class="main">

  <div class="breadcrumb">
    <a href="../inspo.html">Inspo</a>
    <span>›</span>
    <a href="../swipefile.html">Swipe File</a>
    <span>›</span>
    Design
  </div>

  <div class="page-tag">✦ Design</div>
  <h1 class="page-title">Design</h1>
  <p class="page-subtitle">Screenshots worth stealing from.</p>

  <div class="section-head" id="collected">Collected</div>
  <div class="design-grid">

    <!-- TEMPLATE A: with screenshot image -->

    <a class="design-card" href="SOURCE_URL" target="_blank" rel="noopener">
      <div class="design-img">
        <img src="path/to/screenshot.png" alt="Description">
      </div>

      <div class="design-body">

      </div>

    <!-- END TEMPLATE -->

  </div>

  <div class="page-footer">

    <a href="../index.html">nilarkian.github.io/Saptak</a>
  </div>

</main>

<script>
const main  = document.querySelector('.main');
const toc   = document.getElementById('toc');
const heads = main.querySelectorAll('.section-head');
heads.forEach((h, i) => {
  if (!h.id) h.id = 'section-' + i;
  const li = document.createElement('li');
  const a  = document.createElement('a');
  a.href = '#' + h.id;
  a.textContent = h.textContent.replace(/^[^a-zA-Z]+/, '').trim();
  li.appendChild(a); toc.appendChild(li);
});
const links = toc.querySelectorAll('a');
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      links.forEach(l => l.classList.remove('active'));
      const a = toc.querySelector(`a[href="#${e.target.id}"]`);
      if (a) a.classList.add('active');
    }
  });
}, { rootMargin: '0px 0px -60% 0px' });
heads.forEach(h => observer.observe(h));
</script>

</body>
</html>
