<script>
// ── NOTHING BELOW NEEDS EDITING ──

function getVideoId(url) {
  try {
    const u = new URL(url);
    if (u.searchParams.get('v')) return u.searchParams.get('v');
    if (u.hostname === 'youtu.be') return u.pathname.slice(1);
    const embedMatch = u.pathname.match(/\/embed\/([^/?]+)/);
    if (embedMatch) return embedMatch[1];
  } catch(e) {}
  return null;
}

function renderVideos() {
  const grid = document.getElementById('video-grid');
  VIDEOS.forEach(v => {
    const id    = getVideoId(v.url);
    const thumb = id ? `https://i.ytimg.com/vi/${id}/hqdefault.jpg` : null;
    const card  = document.createElement('a');
    card.className = 'video-card';
    card.href      = v.url;
    card.target    = '_blank';
    card.rel       = 'noopener';
    card.innerHTML = `
      <div class="video-thumb">
        ${thumb ? `<img src="${thumb}" alt="" loading="lazy">` : ''}
      </div>
      <div class="video-body">
        <div class="video-title">${v.title || id || v.url}</div>
        ${v.desc ? `<div class="video-desc">${v.desc}</div>` : ''}
      </div>`;
    grid.appendChild(card);
  });
}

renderVideos();

const main  = document.querySelector('.main');
const toc   = document.getElementById('toc');
const heads = main.querySelectorAll('.section-head');
heads.forEach((h, i) => {
  if (!h.id) h.id = 'section-' + i;
  const li = document.createElement('li');
  const a  = document.createElement('a');
  a.href = '#' + h.id;
  a.textContent = h.textContent.replace(/^[^a-zA-Z]+/, '').trim();
  li.appendChild(a); toc.appendChild(li);
});
const links = toc.querySelectorAll('a');
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      links.forEach(l => l.classList.remove('active'));
      const a = toc.querySelector(`a[href="#${e.target.id}"]`);
      if (a) a.classList.add('active');
    }
  });
}, { rootMargin: '0px 0px -60% 0px' });
heads.forEach(h => observer.observe(h));
</script>
