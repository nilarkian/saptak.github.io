<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<title>YouTube — Swipe File — Saptak</title>
<style>

:root {
  --bg: #f7f7f7;
  --ink: #111;
  --border: #ddd;
  --accent: #c8440a;
  --radius: 18px;
  --pill: 999px;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--bg); color: var(--ink); display: flex; min-height: 100vh; }
a { text-decoration: none; color: var(--ink); }

/* ── SIDEBAR ── */
.sidebar {
  position: fixed; top: 0; left: 0;
  width: 240px; height: 100vh;
  background: #efefef; border-right: 1px solid var(--border);
  padding: 40px 20px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 28px;
}
.sidebar .back {
  font-family: var(--font-head); font-size: 13px; font-weight: 600;
  border: 2px solid var(--ink); padding: 8px 16px; border-radius: var(--pill);
  display: inline-block; transition: .2s; width: fit-content;
}
.sidebar .back:hover { background: var(--ink); color: var(--bg); }
.toc-label { font-family: var(--font-head); font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; opacity: .4; }
.toc { display: flex; flex-direction: column; gap: 4px; list-style: none; }
.toc li a { font-family: var(--font-body); font-size: 13px; line-height: 1.5; display: block; padding: 5px 10px; border-radius: 6px; color: #444; transition: .15s; border-left: 2px solid transparent; }
.toc li a:hover { background: rgba(0,0,0,.06); color: var(--ink); }
.toc li a.active { border-left: 2px solid var(--ink); color: var(--ink); font-weight: 600; background: rgba(0,0,0,.05); }

/* ── MAIN ── */
.main { margin-left: 240px; flex: 1; padding: 60px 64px 120px; max-width: 860px; }
.breadcrumb { font-family: var(--font-body); font-size: 12px; opacity: .4; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 24px; }
.breadcrumb span { margin: 0 6px; }
.page-tag { font-family: var(--font-head); font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; background: var(--ink); color: var(--bg); display: inline-block; padding: 4px 12px; border-radius: var(--pill); margin-bottom: 20px; }
.page-title { font-family: var(--font-head); font-size: 42px; font-weight: 700; letter-spacing: -1.5px; margin-bottom: 10px; line-height: 1.1; }
.page-subtitle { font-size: 17px; opacity: .5; margin-bottom: 60px; }
.section-head { font-family: var(--font-head); font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; opacity: .35; margin-bottom: 20px; scroll-margin-top: 32px; }

/* ── VIDEO GRID ── */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
  margin-bottom: 60px;
}

.video-card {
  display: block;
  border: 2px solid var(--ink);
  border-radius: var(--radius);
  overflow: hidden;
  text-decoration: none;
  color: var(--ink);
  transition: .22s ease;
}

.video-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 28px rgba(0,0,0,.11);
  background: var(--ink);
  color: white;
}

/* 16:9 thumbnail area */
.video-thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.video-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* play button overlay */
.video-thumb::after {
  content: '▶';
  position: absolute;
  font-size: 28px;
  color: white;
  background: rgba(0,0,0,.55);
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-left: 4px;
  transition: .2s;
}

.video-card:hover .video-thumb::after {
  background: rgba(255,255,255,.2);
  transform: scale(1.1);
}

/* placeholder when no thumbnail */
.video-thumb.no-thumb {
  background: #e8e8e8;
  font-size: 36px;
}
.video-thumb.no-thumb::after { display: none; }
.video-thumb.no-thumb .play-placeholder {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--ink);
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 20px;
  padding-left: 4px;
}

.video-body {
  padding: 16px 18px;
  border-top: 2px solid var(--ink);
}

.video-card:hover .video-body { border-top-color: rgba(255,255,255,.15); }

.video-channel {
  font-family: var(--font-head);
  font-size: 10px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  opacity: .4; margin-bottom: 6px;
}

.video-title {
  font-family: var(--font-head);
  font-size: 15px; font-weight: 700;
  line-height: 1.4; margin-bottom: 6px;
}

.video-desc {
  font-size: 13px; opacity: .45; line-height: 1.5;
}

/* ── FOOTER ── */
.page-footer { font-family: var(--font-body); font-size: 13px; opacity: .35; margin-top: 80px; border-top: 1px solid var(--border); padding-top: 28px; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 40px 24px 80px; }
  .page-title { font-size: 30px; }
}

</style>
</head>
<body>

<aside class="sidebar">
  <a class="back" href="../swipefile.html">← Swipe File</a>
  <div><div class="toc-label">On this page</div></div>
  <ul class="toc" id="toc"></ul>
</aside>

<main class="main">

  <div class="breadcrumb">
    <a href="../inspo.html">Inspo</a>
    <span>›</span>
    <a href="../swipefile.html">Swipe File</a>
    <span>›</span>
    YouTube
  </div>

  <div class="page-tag">▶ YouTube</div>
  <h1 class="page-title">YouTube</h1>
  <p class="page-subtitle">Videos I actually watched twice.</p>

  <div class="section-head" id="collected">Collected</div>
  <div class="video-grid">

    <!-- TEMPLATE — duplicate this block to add a video -->
    <!-- Option A: with YouTube thumbnail (paste video ID from URL) -->
    <a class="video-card" href="https://youtube.com/watch?v=VIDEO_ID" target="_blank" rel="noopener">
      <div class="video-thumb">
        <img src="https://i.ytimg.com/vi/VIDEO_ID/hqdefault.jpg" alt="Video title" loading="lazy">
      </div>
      <div class="video-body">
        <div class="video-channel">Channel Name</div>
        <div class="video-title">Video Title</div>
        <div class="video-desc">One line on why it's worth watching.</div>
      </div>
    </a>

    <!-- Option B: no thumbnail (just replace VIDEO_ID with actual id, or use this) -->
    <!--
    <a class="video-card" href="https://youtube.com/watch?v=VIDEO_ID" target="_blank" rel="noopener">
      <div class="video-thumb no-thumb">
        <div class="play-placeholder">▶</div>
      </div>
      <div class="video-body">
        <div class="video-channel">Channel Name</div>
        <div class="video-title">Video Title</div>
        <div class="video-desc">One line on why it's worth watching.</div>
      </div>
    </a>
    -->
    <!-- END TEMPLATE -->

  </div>

  <div class="page-footer">
    Collected by Saptak ·
    <a href="../index.html">nilarkian.github.io/Saptak</a>
  </div>

</main>

<script>
const main  = document.querySelector('.main');
const toc   = document.getElementById('toc');
const heads = main.querySelectorAll('.section-head');
heads.forEach((h, i) => {
  if (!h.id) h.id = 'section-' + i;
  const li = document.createElement('li');
  const a  = document.createElement('a');
  a.href = '#' + h.id;
  a.textContent = h.textContent.replace(/^[^a-zA-Z]+/, '').trim();
  li.appendChild(a); toc.appendChild(li);
});
const links = toc.querySelectorAll('a');
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      links.forEach(l => l.classList.remove('active'));
      const a = toc.querySelector(`a[href="#${e.target.id}"]`);
      if (a) a.classList.add('active');
    }
  });
}, { rootMargin: '0px 0px -60% 0px' });
heads.forEach(h => observer.observe(h));
</script>

</body>
</html>
