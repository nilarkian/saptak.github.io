.nav{

.quick-links{
display:flex;
justify-content:center;

gap:6px;

margin-bottom:72px;
}

.quick-links-label{
font-size:11px;
font-weight:700;
letter-spacing:.12em;
text-transform:uppercase;
opacity:.25;
margin-right:4px;

.quick-links a{
text-decoration:none;
color:#111;
font-size:12px;
opacity:.35;
padding:4px 10px;
border-radius:999px;

.quick-links a:hover{

.quick-links-sep{

margin-bottom:35px;

justify-content:center;
gap:34px;
flex-wrap:wrap;
font-size:21px;
margin-bottom:38px;

.contact-text span{

transition:.2s;
border-bottom:1px dotted #aaa;

.contact-text span:hover{ opacity:.6; }

.social-icons{
display:flex;
justify-content:center;
gap:42px;
font-size:38px;
margin-bottom:25px;

.social-icons a{
color:#111;
text-decoration:none;
transition:.25s;
cursor:pointer;

.social-icons a:hover{
transform:translateY(-4px) scale(1.12);
opacity:.75;

#copied{ height:25px; opacity:.6; font-size:15px; }

.footer{ margin-top:70px; font-size:15px; opacity:.5; }
