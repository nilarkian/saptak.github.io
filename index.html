.content{

.nav{
display:flex;

.nav a:hover{

}

.contact-text span:hover{

.social-icons{

justify-content:center;
gap:34px;
font-size:42px;
margin-bottom:25px;

.social-icons a{
text-decoration:none;
transition:.2s;
}

.social-icons a:hover{
transform:translateY(-4px) scale(1.08);
}

#copied{
height:25px;
opacity:.6;
font-size:15px;
}

.footer{
margin-top:70px;
font-size:15px;
opacity:.5;
}

/* MOBILE */

@media(max-width:768px){

}

font-size:42px;
